name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      # todo-agent is a lazy, deployment-side dependency. Unit tests inject its
      # public API, so this public repository does not require cross-repository
      # credentials to validate the connector contract.
      - run: python -m pip install -e '.[test]'
      - run: ruff check .
      - run: python -m pytest
      - run: python -m build
